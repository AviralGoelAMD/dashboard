<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 28px 32px;
    }

    /* ── Header ─────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .header-left h1 { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; }
    .header-left p  { font-size: 0.82rem; color: #64748b; margin-top: 2px; }

    #next-holiday {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px !important;
      font-size: 0.75rem !important;
      color: #4b5563 !important;
    }
    #next-holiday .nh-dot {
      width: 7px; height: 7px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    #next-holiday .nh-days {
      font-weight: 700;
      color: #818cf8;
    }
    #next-holiday .nh-name {
      color: #94a3b8;
    }
    #next-holiday .nh-date {
      color: #4b5563;
    }

    #add-btn {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }
    #add-btn:hover { background: #4338ca; }

    /* ── Layout ─────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
      align-items: start;
    }

    /* ── Link Tiles ──────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .tile {
      position: relative;
      background: #1e2130;
      border-radius: 12px;
      border: 1px solid #2a2d3e;
      overflow: hidden;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .tile:hover {
      transform: translateY(-3px);
      border-color: #3d4166;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .tile-accent { height: 3px; width: 100%; }

    .tile a {
      display: block;
      padding: 20px 16px 16px;
      text-decoration: none;
      color: inherit;
    }

    .tile-icon  { font-size: 1.8rem; margin-bottom: 10px; }
    .tile-title { font-size: 0.92rem; font-weight: 600; color: #e2e8f0; margin-bottom: 4px; }
    .tile-url   { font-size: 0.72rem; color: #4b5563; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .delete-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(255,255,255,0.06);
      border: none;
      border-radius: 50%;
      width: 22px; height: 22px;
      font-size: 0.7rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
    }
    .tile:hover .delete-btn  { display: flex; }
    .delete-btn:hover { background: rgba(220,38,38,0.25); color: #f87171; }

    .tile[draggable="true"] { cursor: grab; }
    .tile[draggable="true"]:active { cursor: grabbing; }
    .tile.drag-over {
      border-color: #4f46e5;
      box-shadow: 0 0 0 2px #4f46e540;
    }
    .tile.dragging { opacity: 0.35; }

    #empty-msg { color: #4b5563; text-align: center; margin-top: 48px; font-size: 0.9rem; }

    /* ── PR Widget ───────────────────────────── */
    #pr-section {
      margin-top: 24px;
    }

    .pr-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    #pr-refresh {
      background: #2a2d3e;
      border: none;
      color: #94a3b8;
      font-size: 0.8rem;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #pr-refresh:hover { background: #323650; color: #e2e8f0; }
    #pr-refresh:disabled { opacity: 0.5; cursor: default; }

    #pr-list { display: flex; flex-direction: column; gap: 8px; }

    .pr-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: #141720;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .pr-item:hover { border-color: #4f46e5; background: #1a1d2e; }

    .pr-number {
      font-size: 0.75rem;
      font-weight: 700;
      color: #4b5563;
      font-variant-numeric: tabular-nums;
      min-width: 44px;
    }

    .pr-title {
      flex: 1;
      font-size: 0.88rem;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pr-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .pr-age {
      font-size: 0.72rem;
      color: #4b5563;
    }

    .pr-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
    }
    .badge-draft  { background: rgba(75,85,99,0.3);     color: #6b7280; }
    .badge-open   { background: rgba(79,70,229,0.15);   color: #818cf8; }
    .badge-review { background: rgba(245,158,11,0.15);  color: #fbbf24; }

    .pr-status-msg {
      font-size: 0.83rem;
      color: #4b5563;
      padding: 20px 0;
      text-align: center;
    }

    .ci-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
    }
    .ci-badge:hover { opacity: 0.8; }
    .ci-pending { background: rgba(75,85,99,0.3);    color: #6b7280; }
    .ci-running { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .ci-success { background: rgba(16,185,129,0.15); color: #10b981; }
    .ci-failure { background: rgba(239,68,68,0.15);  color: #f87171; }
    .ci-unknown { background: rgba(75,85,99,0.3);    color: #6b7280; }

    /* ── Sidebar ─────────────────────────────── */
    .sidebar { display: flex; flex-direction: column; gap: 20px; }

    .widget {
      background: #1e2130;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 18px;
    }

    .widget-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4b5563;
      margin-bottom: 14px;
    }

    /* World Clock */
    .clock-grid { display: flex; flex-direction: column; gap: 10px; }

    .clock-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clock-label {
      font-size: 0.78rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tz-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    .clock-time {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e2e8f0;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    .clock-date {
      font-size: 0.68rem;
      color: #4b5563;
      text-align: right;
      margin-top: 1px;
    }

    .clock-right { text-align: right; }

    /* Working hours indicator */
    .working-indicator {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
    }
    .working-indicator.active  { background: rgba(16,185,129,0.15); color: #10b981; }
    .working-indicator.outside { background: rgba(75,85,99,0.3);    color: #6b7280; }

    .clock-divider {
      border: none;
      border-top: 1px solid #2a2d3e;
      margin: 4px 0;
    }


    /* ── Year Calendar ───────────────────────── */
    .hcal-legend {
      display: flex;
      gap: 18px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .hcal-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: #4b5563;
    }
    .hcal-legend-dot {
      width: 9px; height: 9px;
      border-radius: 3px;
    }

    .hcal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px 32px;
    }

    .hcal-month-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .hcal-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .hcal-dow-row span {
      font-size: 0.65rem;
      text-align: center;
      color: #374151;
      font-weight: 700;
      text-transform: uppercase;
    }

    .hcal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .hcal-day {
      font-size: 0.75rem;
      text-align: center;
      line-height: 26px;
      height: 26px;
      border-radius: 5px;
      color: #4b5563;
      cursor: default;
      font-variant-numeric: tabular-nums;
    }
    .hcal-blank { visibility: hidden; }

    .hcal-holiday {
      color: #0f1117;
      font-weight: 700;
      cursor: default;
    }

    .hcal-today {
      background: #4f46e5 !important;
      color: #fff !important;
      font-weight: 700;
      box-shadow: 0 0 0 2px #4f46e580;
    }


    /* ── Modal ───────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: #1e2130;
      border: 1px solid #2a2d3e;
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    #modal h2 { font-size: 1rem; margin-bottom: 20px; color: #f1f5f9; }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: #4b5563;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field input {
      width: 100%;
      padding: 9px 12px;
      background: #141720;
      border: 1.5px solid #2a2d3e;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #4f46e5; }
    .field input::placeholder { color: #374151; }

    .color-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .color-swatch {
      width: 26px; height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: border-color 0.1s, transform 0.1s;
    }
    .color-swatch:hover   { transform: scale(1.15); }
    .color-swatch.selected { border-color: #f1f5f9; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 22px;
    }

    .btn-cancel {
      background: #2a2d3e;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      color: #94a3b8;
    }
    .btn-cancel:hover { background: #323650; }

    .btn-save {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
    }
    .btn-save:hover { background: #4338ca; }

    /* ── Settings button ─────────────────────── */
    #settings-btn {
      background: #2a2d3e;
      color: #94a3b8;
      border: none;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #settings-btn:hover { background: #323650; color: #e2e8f0; }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    /* ── Setup banner ────────────────────────── */
    #setup-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(79,70,229,0.12);
      border: 1px solid rgba(79,70,229,0.3);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 12px;
    }
    #setup-banner p { font-size: 0.88rem; color: #a5b4fc; }
    #setup-banner button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 7px 16px;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
  </style>
</head>

<header>

    <h1>Dashboard</h1>
    <p id="greeting"></p>

  </div>
  <div class="header-actions">
    <button id="settings-btn" title="Settings">⚙</button>
    <button id="add-btn">+ Add Link</button>
  </div>
</header>

<div class="layout">

  <!-- Link tiles -->
  <div>
    <div id="grid"></div>
    <p id="empty-msg" style="display:none">No links yet. Click "+ Add Link" to get started.</p>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- World Clock -->
    <div class="widget">
      <div class="widget-title">World Clock</div>
      <div class="clock-grid" id="clocks"></div>
    </div>


  </div>
</div>

<!-- PR Widget -->
<div id="pr-section" class="widget">

</div>

<!-- Holidays Timeline -->
<div id="holidays-section" class="widget" style="margin-top:24px;">
  <div class="widget-title" style="margin-bottom:16px">2026 AMD Holidays</div>
  <div id="holidays-body"></div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Add Link</h2>
    <div class="field">
      <label>Title</label>
      <input id="inp-title" type="text" placeholder="e.g. GitHub PRs">
    </div>
    <div class="field">
      <label>URL</label>
      <input id="inp-url" type="url" placeholder="https://...">
    </div>
    <div class="field">
      <label>Icon (emoji)</label>
      <input id="inp-icon" type="text" placeholder="e.g. 🔗" maxlength="4">
    </div>
    <div class="field">
      <label>Accent Color</label>
      <div class="color-row" id="color-row"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancel-btn">Cancel</button>
      <button class="btn-save"   id="save-btn">Save</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;">
  <div id="settings-modal" style="background:#1e2130;border:1px solid #2a2d3e;border-radius:14px;padding:28px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,0.6);">
    <h2 style="font-size:1rem;margin-bottom:6px;color:#f1f5f9;">Settings</h2>
    <p style="font-size:0.78rem;color:#4b5563;margin-bottom:20px;">Stored locally in your browser — each person sets their own.</p>
    <div class="field">
      <label>Your GitHub Username</label>
      <input id="inp-ghuser" type="text" placeholder="e.g. AviralGoelAMD">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="settings-cancel">Cancel</button>
      <button class="btn-save"   id="settings-save">Save</button>
    </div>
  </div>
</div>

  { label: "CST", tz: "America/Chicago",     dot: "#10b981", flag: "🌆" },
  { label: "MST", tz: "America/Denver",      dot: "#f59e0b", flag: "🏔️" },
  { label: "PST", tz: "America/Los_Angeles", dot: "#ef4444", flag: "🌉" },
  { label: "CET", tz: "Europe/Warsaw",       dot: "#ec4899", flag: "🇵🇱" },
  { label: "HKT", tz: "Asia/Hong_Kong",      dot: "#f97316", flag: "🇭🇰" },
];

// ── State ────────────────────────────────────────────────────
let links = JSON.parse(localStorage.getItem('dashboard-links-v7') || 'null');
if (!links) {
  links = DEFAULT_LINKS;
  localStorage.setItem('dashboard-links-v7', JSON.stringify(links));
}

let selectedColor = COLORS[0];

// ── Greeting ─────────────────────────────────────────────────
function updateGreeting() {
  const hour = new Date().getHours();
  const greet = hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
  const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('greeting').textContent = `${greet} — ${dateStr}`;
}

function updateNextHoliday() {
  const el = document.getElementById('next-holiday');
  if (!el) return;
  const todayStr = new Date().toLocaleDateString('en-CA');

  const all = [
    ...RECHARGE_DAYS.map(h    => ({ ...h, type: 'recharge' })),
    ...FIXED_HOLIDAYS.map(h   => ({ ...h, type: 'fixed'    })),
    ...FLOATING_HOLIDAYS.map(h => ({ ...h, type: 'floating' })),
  ].filter(h => h.date >= todayStr).sort((a, b) => a.date.localeCompare(b.date));

  if (!all.length) { el.textContent = ''; return; }

  const next = all[0];
  const [y, m, d] = next.date.split('-').map(Number);
  const nextDate  = new Date(y, m - 1, d);
  const today     = new Date(); today.setHours(0,0,0,0);
  const daysAway  = Math.round((nextDate - today) / 86400000);

  const dateLabel = nextDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', weekday: 'short' });
  const daysLabel = daysAway === 0 ? 'Today' : daysAway === 1 ? 'Tomorrow' : `In ${daysAway} days`;
  const color     = H_COLOR[next.type];

  el.innerHTML = `
    <span class="nh-dot" style="background:${color}"></span>
    <span class="nh-days">${daysLabel}</span>
    <span class="nh-name">${next.label}</span>
    <span class="nh-date">· ${dateLabel}</span>`;
}

updateGreeting();
updateNextHoliday();

// ── World Clock ──────────────────────────────────────────────
function isWorkingHours(tz) {
  const now = new Date();
  const h = parseInt(new Intl.DateTimeFormat('en-US', { hour: 'numeric', hour12: false, timeZone: tz }).format(now));
  return h >= 9 && h < 18;
}

function renderClocks() {
  const container = document.getElementById('clocks');
  container.innerHTML = '';

  TIMEZONES.forEach((entry, i) => {
    const now = new Date();

    const timeStr = new Intl.DateTimeFormat('en-US', {
      hour: 'numeric', minute: '2-digit', second: '2-digit',
      hour12: true, timeZone: entry.tz
    }).format(now);

    const dateStr = new Intl.DateTimeFormat('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      timeZone: entry.tz
    }).format(now);

    const working = isWorkingHours(entry.tz);

    const row = document.createElement('div');
    row.className = 'clock-row';
    row.innerHTML = `
      <div class="clock-label">
        <span class="tz-dot" style="background:${entry.dot}"></span>
        ${entry.flag} ${entry.label}
        <span class="working-indicator ${working ? 'active' : 'outside'}">${working ? 'online' : 'off hrs'}</span>
      </div>
      <div class="clock-right">
        <div class="clock-time" id="time-${i}">${timeStr}</div>
        <div class="clock-date" id="date-${i}">${dateStr}</div>
      </div>
    `;
    container.appendChild(row);

    if (i < TIMEZONES.length - 1) {
      const hr = document.createElement('hr');
      hr.className = 'clock-divider';
      container.appendChild(hr);
    }
  });
}

function tickClocks() {
  const now = new Date();
  TIMEZONES.forEach((entry, i) => {
    const timeEl = document.getElementById(`time-${i}`);
    const dateEl = document.getElementById(`date-${i}`);
    if (!timeEl) return;

    timeEl.textContent = new Intl.DateTimeFormat('en-US', {
      hour: 'numeric', minute: '2-digit', second: '2-digit',
      hour12: true, timeZone: entry.tz
    }).format(now);

    dateEl.textContent = new Intl.DateTimeFormat('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      timeZone: entry.tz
    }).format(now);
  });
}

renderClocks();
setInterval(tickClocks, 1000);

// ── Link Tiles ───────────────────────────────────────────────
function saveLinks() {
  localStorage.setItem('dashboard-links-v7', JSON.stringify(links));
}

function render() {
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty-msg');
  grid.innerHTML = '';
  empty.style.display = links.length ? 'none' : 'block';

  links.forEach((link, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';

    const accent = document.createElement('div');
    accent.className = 'tile-accent';
    accent.style.background = link.color || COLORS[0];

    const a = document.createElement('a');
    a.href   = link.url;
    a.target = '_blank';
    a.rel    = 'noopener noreferrer';

    const icon  = document.createElement('div');
    icon.className   = 'tile-icon';
    icon.textContent = link.icon || '🔗';

    const title = document.createElement('div');
    title.className   = 'tile-title';
    title.textContent = link.title;

    const url = document.createElement('div');
    url.className   = 'tile-url';
    url.textContent = link.url.replace(/^https?:\/\//, '').replace(/\?.*$/, '');

    a.append(icon, title, url);

    const del = document.createElement('button');
    del.className   = 'delete-btn';
    del.textContent = '✕';
    del.title       = 'Remove';
    del.addEventListener('click', (e) => {
      e.preventDefault();
      links.splice(i, 1);
      saveLinks();
      render();
    });

    // Drag-and-drop
    tile.setAttribute('draggable', 'true');
    tile.dataset.index = i;

    tile.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', i);
      setTimeout(() => tile.classList.add('dragging'), 0);
    });
    tile.addEventListener('dragend', () => {
      tile.classList.remove('dragging');
      document.querySelectorAll('.tile').forEach(t => t.classList.remove('drag-over'));
    });
    tile.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.tile').forEach(t => t.classList.remove('drag-over'));
      tile.classList.add('drag-over');
    });
    tile.addEventListener('dragleave', () => tile.classList.remove('drag-over'));
    tile.addEventListener('drop', e => {
      e.preventDefault();
      tile.classList.remove('drag-over');
      const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
      const toIdx   = parseInt(tile.dataset.index);
      if (fromIdx === toIdx) return;
      const moved = links.splice(fromIdx, 1)[0];
      links.splice(toIdx, 0, moved);
      saveLinks();
      render();
    });

    tile.append(accent, a, del);
    grid.appendChild(tile);
  });
}

// ── PR Widget ────────────────────────────────────────────────
function relativeAge(dateStr) {
  const diff  = Date.now() - new Date(dateStr).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins  < 60)  return `${mins}m ago`;
  if (hours < 24)  return `${hours}h ago`;
  return `${days}d ago`;
}

async function fetchPRs() {
  if (!githubUser) throw new Error('NO_USER');
  const base = `is:open is:pr repo:ROCm/rocm-libraries label:"project: composablekernel"`;
  const authorQ   = `${base} author:${githubUser}`;
  const assigneeQ = `${base} assignee:${githubUser}`;
  const [authorRes, assigneeRes] = await Promise.all([
    fetch(`https://api.github.com/search/issues?q=${encodeURIComponent(authorQ)}&per_page=30&sort=updated&order=desc`,   { headers: { Accept: 'application/vnd.github+json' } }),
    fetch(`https://api.github.com/search/issues?q=${encodeURIComponent(assigneeQ)}&per_page=30&sort=updated&order=desc`, { headers: { Accept: 'application/vnd.github+json' } }),
  ]);
  if (!authorRes.ok)   throw new Error(`GitHub API returned ${authorRes.status}`);
  if (!assigneeRes.ok) throw new Error(`GitHub API returned ${assigneeRes.status}`);
  const [authorData, assigneeData] = await Promise.all([authorRes.json(), assigneeRes.json()]);
  // Merge, deduplicate by PR number
  const seen = new Set();
  const items = [];
  for (const pr of [...authorData.items, ...assigneeData.items]) {
    if (!seen.has(pr.number)) { seen.add(pr.number); items.push(pr); }
  }
  items.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
  return { items };
}

function renderPRs(items) {
  const list = document.getElementById('pr-list');
  if (!items.length) {
    list.innerHTML = '<div class="pr-status-msg">No open PRs found.</div>';
    return;
  }
  list.innerHTML = '';
  items.forEach(pr => {
    const isDraft     = pr.draft;
    const needsReview = pr.labels.some(l => l.name.toLowerCase().includes('review'));

    let badgeHtml = '';
    if (isDraft)           badgeHtml = '<span class="pr-badge badge-draft">Draft</span>';
    else if (needsReview)  badgeHtml = '<span class="pr-badge badge-review">Review</span>';
    else                   badgeHtml = '<span class="pr-badge badge-open">Open</span>';

    const checksUrl = pr.html_url;

    // Outer div is clickable (navigates to PR); CI badge is a separate link inside
    const row = document.createElement('div');
    row.className = 'pr-item';
    row.style.cursor = 'pointer';
    row.dataset.href = pr.html_url;
    row.addEventListener('click', () => window.open(pr.html_url, '_blank'));

    row.innerHTML = `
      <span class="pr-number">#${pr.number}</span>
      <span class="pr-title">${pr.title}</span>
      <span class="pr-meta">
        <span class="pr-age">updated ${relativeAge(pr.updated_at)}</span>
        ${badgeHtml}
        <a class="ci-badge ci-pending"
           id="ci-${pr.number}"
           href="${checksUrl}"
           target="_blank"
           rel="noopener noreferrer"
           title="View checks"
           onclick="event.stopPropagation()">CI ···</a>
      </span>
    `;
    list.appendChild(row);
  });
}

// Combine check-runs + commit statuses into one accurate summary,
// matching what GitHub shows on the PR checks page.
function computeCIStatus(checkRuns, commitStatuses) {
  // Deduplicate check-runs: keep only the latest attempt per name
  const latest = {};
  checkRuns.forEach(r => {
    if (!latest[r.name] || r.id > latest[r.name].id) latest[r.name] = r;
  });
  const runs = Object.values(latest);

  // Counts from check-runs
  const crPending = runs.filter(r => r.status !== 'completed').length;
  const crFailed  = runs.filter(r => ['failure','timed_out','action_required'].includes(r.conclusion)).length;
  const crSkipped = runs.filter(r => ['skipped','neutral'].includes(r.conclusion)).length;
  const crPassed  = runs.filter(r => r.conclusion === 'success').length;

  // Counts from legacy commit statuses (separate API, separate CI systems)
  const stPending = commitStatuses.filter(s => s.state === 'pending').length;
  const stFailed  = commitStatuses.filter(s => ['failure','error'].includes(s.state)).length;
  const stPassed  = commitStatuses.filter(s => s.state === 'success').length;

  const totalFailed  = crFailed  + stFailed;
  const totalPending = crPending + stPending;
  const totalSkipped = crSkipped;
  const totalPassed  = crPassed  + stPassed;
  const total        = runs.length + commitStatuses.length;

  if (!total) return { cls: 'ci-unknown', label: 'CI –' };

  // Build a summary label like GitHub: "1 failing, 2 pending, 28 passed"
  if (!total) return { cls: 'ci-unknown', label: 'CI –' };

  const parts = [];
  if (totalFailed)  parts.push(`✗ ${totalFailed} failing`);
  if (totalPending) parts.push(`⟳ ${totalPending} pending`);
  if (totalSkipped) parts.push(`${totalSkipped} skipped`);
  if (totalPassed)  parts.push(`✓ ${totalPassed} passed`);

  const label = parts.join(' · ');
  if (totalFailed)  return { cls: 'ci-failure', label };
  if (totalPending) return { cls: 'ci-running',  label };
  return { cls: 'ci-success', label };
}

async function loadCIForPR(prNumber) {
  // 1. Get head SHA
  const prRes = await fetch(
    `https://api.github.com/repos/ROCm/rocm-libraries/pulls/${prNumber}`,
    { headers: { Accept: 'application/vnd.github+json' } }
  );
  if (!prRes.ok) throw new Error(`PR fetch ${prRes.status}`);
  const sha = (await prRes.json()).head.sha;

  // 2. Fetch ALL check-runs across pages (filter=all so we get every suite)
  let checkRuns = [], page = 1;
  while (true) {
    const res  = await fetch(
      `https://api.github.com/repos/ROCm/rocm-libraries/commits/${sha}/check-runs?per_page=100&filter=all&page=${page}`,
      { headers: { Accept: 'application/vnd.github+json' } }
    );
    const data = await res.json();
    const batch = data.check_runs || [];
    checkRuns = checkRuns.concat(batch);
    if (batch.length < 100) break;
    page++;
  }

  // 3. Fetch legacy commit statuses (different CI systems use this older API)
  const stRes  = await fetch(
    `https://api.github.com/repos/ROCm/rocm-libraries/commits/${sha}/status`,
    { headers: { Accept: 'application/vnd.github+json' } }
  );
  const stData = await stRes.json();
  const commitStatuses = stData.statuses || [];

  return { checkRuns, commitStatuses };
}

async function loadAllCI(prNumbers) {
  await Promise.allSettled(prNumbers.map(async (num) => {
    const el = document.getElementById(`ci-${num}`);
    if (!el) return;
    try {
      const { checkRuns, commitStatuses } = await loadCIForPR(num);
      const { cls, label } = computeCIStatus(checkRuns, commitStatuses);
      el.className = `ci-badge ${cls}`;
      el.textContent = label;
    } catch {
      el.className = 'ci-badge ci-unknown';
      el.textContent = 'CI ?';
    }
  }));
}

function updatePRTitle() {
  const el = document.getElementById('pr-widget-title');
  if (el) el.textContent = githubUser ? `${githubUser}'s Open PRs (authored & assigned) — ROCm/rocm-libraries` : 'Open PRs — ROCm/rocm-libraries';
}

async function loadPRs() {
  const btn  = document.getElementById('pr-refresh');
  const list = document.getElementById('pr-list');
  updatePRTitle();

  if (!githubUser) {
    list.innerHTML = `
      <div id="setup-banner">
        <p>Set your GitHub username to see your open PRs.</p>
        <button onclick="openSettings()">Set username →</button>
      </div>`;
    return;
  }

  btn.disabled = true;
  btn.textContent = '…';
  list.innerHTML = '<div class="pr-status-msg">Loading…</div>';
  try {
    const data = await fetchPRs();
    renderPRs(data.items);
    loadAllCI(data.items.map(pr => pr.number));
  } catch (e) {
    list.innerHTML = `<div class="pr-status-msg">Failed to load PRs: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Refresh';
  }
}

// ── Settings Modal ───────────────────────────────────────────
const settingsOverlay = document.getElementById('settings-overlay');

function openSettings() {
  document.getElementById('inp-ghuser').value = githubUser;
  settingsOverlay.style.display = 'flex';
  document.getElementById('inp-ghuser').focus();
}

document.getElementById('settings-btn').addEventListener('click', openSettings);

document.getElementById('settings-cancel').addEventListener('click', () => {
  settingsOverlay.style.display = 'none';
});

settingsOverlay.addEventListener('click', e => {
  if (e.target === settingsOverlay) settingsOverlay.style.display = 'none';
});

document.getElementById('settings-save').addEventListener('click', () => {
  const val = document.getElementById('inp-ghuser').value.trim();

  githubUser = val;
  localStorage.setItem('dashboard-gh-user', githubUser);
  settingsOverlay.style.display = 'none';
  loadPRs();
});

document.getElementById('pr-refresh').addEventListener('click', loadPRs);
loadPRs();


// ── Holidays ─────────────────────────────────────────────────
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_PER_MONTH_2026 = [31,28,31,30,31,30,31,31,30,31,30,31]; // 2026 is not a leap year

function renderHolidays() {
  const container = document.getElementById('holidays-body');
  if (!container) return;

  const todayStr = new Date().toLocaleDateString('en-CA');

  // Build date → holiday lookup
  const holidayMap = {};
  RECHARGE_DAYS.forEach(h    => { holidayMap[h.date] = { label: h.label, type: 'recharge' }; });
  FIXED_HOLIDAYS.forEach(h   => { holidayMap[h.date] = { label: h.label, type: 'fixed'    }; });
  FLOATING_HOLIDAYS.forEach(h => { holidayMap[h.date] = { label: h.label, type: 'floating' }; });

  const legend = `
    <div class="hcal-legend">
      <span class="hcal-legend-item"><span class="hcal-legend-dot" style="background:#818cf8"></span>Recharge Day</span>
      <span class="hcal-legend-item"><span class="hcal-legend-dot" style="background:#10b981"></span>Fixed Holiday</span>
      <span class="hcal-legend-item"><span class="hcal-legend-dot" style="background:#f59e0b"></span>Floating Holiday (choose 4)</span>
    </div>`;

  let monthsHtml = '';
  for (let m = 0; m < 12; m++) {
    const firstDow  = new Date(2026, m, 1).getDay(); // 0=Sun
    const daysInMon = DAYS_PER_MONTH_2026[m];

    let cells = '';
    for (let i = 0; i < firstDow; i++) cells += '<span class="hcal-day hcal-blank">·</span>';

    for (let d = 1; d <= daysInMon; d++) {
      const dateStr = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const holiday = holidayMap[dateStr];
      const isToday = dateStr === todayStr;

      let cls   = 'hcal-day';
      let style = '';
      let tip   = '';
      if (holiday) {
        cls  += ' hcal-holiday';
        style = `background:${H_COLOR[holiday.type]};`;
        tip   = ` title="${holiday.label}"`;
      }
      if (isToday) cls += ' hcal-today';

      cells += `<span class="${cls}" style="${style}"${tip}>${d}</span>`;
    }

    monthsHtml += `
      <div class="hcal-month">
        <div class="hcal-month-name">${MONTH_NAMES[m]}</div>
        <div class="hcal-dow-row"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
        <div class="hcal-days">${cells}</div>
      </div>`;
  }

  container.innerHTML = legend + `<div class="hcal-grid">${monthsHtml}</div>`;
}

renderHolidays();

// ── Init ─────────────────────────────────────────────────────
render();
