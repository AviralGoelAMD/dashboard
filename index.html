<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 28px 32px;
    }

    /* ── Header ─────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .header-left h1 { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; }
    .header-left p  { font-size: 0.82rem; color: #64748b; margin-top: 2px; }

    #add-btn {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }
    #add-btn:hover { background: #4338ca; }

    /* ── Layout ─────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
      align-items: start;
    }

    /* ── Link Tiles ──────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .tile {
      position: relative;
      background: #1e2130;
      border-radius: 12px;
      border: 1px solid #2a2d3e;
      overflow: hidden;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .tile:hover {
      transform: translateY(-3px);
      border-color: #3d4166;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .tile-accent { height: 3px; width: 100%; }

    .tile a {
      display: block;
      padding: 20px 16px 16px;
      text-decoration: none;
      color: inherit;
    }

    .tile-icon  { font-size: 1.8rem; margin-bottom: 10px; }
    .tile-title { font-size: 0.92rem; font-weight: 600; color: #e2e8f0; margin-bottom: 4px; }
    .tile-url   { font-size: 0.72rem; color: #4b5563; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .delete-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(255,255,255,0.06);
      border: none;
      border-radius: 50%;
      width: 22px; height: 22px;
      font-size: 0.7rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
    }
    .tile:hover .delete-btn  { display: flex; }
    .delete-btn:hover { background: rgba(220,38,38,0.25); color: #f87171; }

    .tile[draggable="true"] { cursor: grab; }
    .tile[draggable="true"]:active { cursor: grabbing; }
    .tile.drag-over {
      border-color: #4f46e5;
      box-shadow: 0 0 0 2px #4f46e540;
    }
    .tile.dragging { opacity: 0.35; }

    #empty-msg { color: #4b5563; text-align: center; margin-top: 48px; font-size: 0.9rem; }

    /* ── PR Widget ───────────────────────────── */
    #pr-section {
      margin-top: 24px;
    }

    .pr-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    #pr-refresh {
      background: #2a2d3e;
      border: none;
      color: #94a3b8;
      font-size: 0.8rem;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #pr-refresh:hover { background: #323650; color: #e2e8f0; }
    #pr-refresh:disabled { opacity: 0.5; cursor: default; }

    #pr-list { display: flex; flex-direction: column; gap: 8px; }

    .pr-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: #141720;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .pr-item:hover { border-color: #4f46e5; background: #1a1d2e; }

    .pr-number {
      font-size: 0.75rem;
      font-weight: 700;
      color: #4b5563;
      font-variant-numeric: tabular-nums;
      min-width: 44px;
    }

    .pr-title {
      flex: 1;
      font-size: 0.88rem;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pr-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .pr-age {
      font-size: 0.72rem;
      color: #4b5563;
    }

    .pr-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
    }
    .badge-draft  { background: rgba(75,85,99,0.3);     color: #6b7280; }
    .badge-open   { background: rgba(79,70,229,0.15);   color: #818cf8; }
    .badge-review { background: rgba(245,158,11,0.15);  color: #fbbf24; }

    .pr-status-msg {
      font-size: 0.83rem;
      color: #4b5563;
      padding: 20px 0;
      text-align: center;
    }

    .ci-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
    }
    .ci-badge:hover { opacity: 0.8; }
    .ci-pending { background: rgba(75,85,99,0.3);    color: #6b7280; }
    .ci-running { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .ci-success { background: rgba(16,185,129,0.15); color: #10b981; }
    .ci-failure { background: rgba(239,68,68,0.15);  color: #f87171; }
    .ci-unknown { background: rgba(75,85,99,0.3);    color: #6b7280; }

    /* ── Sidebar ─────────────────────────────── */
    .sidebar { display: flex; flex-direction: column; gap: 20px; }

    .widget {
      background: #1e2130;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 18px;
    }

    .widget-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4b5563;
      margin-bottom: 14px;
    }

    /* World Clock */
    .clock-grid { display: flex; flex-direction: column; gap: 10px; }

    .clock-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clock-label {
      font-size: 0.78rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tz-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    .clock-time {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e2e8f0;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    .clock-date {
      font-size: 0.68rem;
      color: #4b5563;
      text-align: right;
      margin-top: 1px;
    }

    .clock-right { text-align: right; }

    /* Working hours indicator */
    .working-indicator {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
    }
    .working-indicator.active  { background: rgba(16,185,129,0.15); color: #10b981; }
    .working-indicator.outside { background: rgba(75,85,99,0.3);    color: #6b7280; }

    .clock-divider {
      border: none;
      border-top: 1px solid #2a2d3e;
      margin: 4px 0;
    }

    /* ── Stock Widget ────────────────────────── */
    .stock-price {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stock-change {
      font-size: 0.82rem;
      font-weight: 600;
    }
    .stock-change.up   { color: #10b981; }
    .stock-change.down { color: #f87171; }

    .stock-meta {
      font-size: 0.7rem;
      color: #4b5563;
      margin-top: 6px;
    }

    .stock-bar-wrap {
      margin-top: 12px;
      background: #2a2d3e;
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
    }

    .stock-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s;
    }


    /* ── Modal ───────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: #1e2130;
      border: 1px solid #2a2d3e;
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    #modal h2 { font-size: 1rem; margin-bottom: 20px; color: #f1f5f9; }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: #4b5563;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field input {
      width: 100%;
      padding: 9px 12px;
      background: #141720;
      border: 1.5px solid #2a2d3e;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #4f46e5; }
    .field input::placeholder { color: #374151; }

    .color-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .color-swatch {
      width: 26px; height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: border-color 0.1s, transform 0.1s;
    }
    .color-swatch:hover   { transform: scale(1.15); }
    .color-swatch.selected { border-color: #f1f5f9; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 22px;
    }

    .btn-cancel {
      background: #2a2d3e;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      color: #94a3b8;
    }
    .btn-cancel:hover { background: #323650; }

    .btn-save {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
    }
    .btn-save:hover { background: #4338ca; }

    /* ── Settings button ─────────────────────── */
    #settings-btn {
      background: #2a2d3e;
      color: #94a3b8;
      border: none;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #settings-btn:hover { background: #323650; color: #e2e8f0; }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    /* ── Setup banner ────────────────────────── */
    #setup-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(79,70,229,0.12);
      border: 1px solid rgba(79,70,229,0.3);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 12px;
    }
    #setup-banner p { font-size: 0.88rem; color: #a5b4fc; }
    #setup-banner button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 7px 16px;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Dashboard</h1>
    <p id="greeting"></p>
  </div>
  <div class="header-actions">
    <button id="settings-btn" title="Settings">⚙</button>
    <button id="add-btn">+ Add Link</button>
  </div>
</header>

<div class="layout">

  <!-- Link tiles -->
  <div>
    <div id="grid"></div>
    <p id="empty-msg" style="display:none">No links yet. Click "+ Add Link" to get started.</p>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Stock Ticker -->
    <a class="widget" id="stock-widget" href="https://finance.yahoo.com/quote/AMD" target="_blank" rel="noopener noreferrer" style="text-decoration:none;display:block;">
      <div class="widget-title" style="margin-bottom:10px">AMD · NASDAQ</div>
      <div id="stock-body"><div style="color:#4b5563;font-size:0.82rem">Loading…</div></div>
    </a>

    <!-- World Clock -->
    <div class="widget">
      <div class="widget-title">World Clock</div>
      <div class="clock-grid" id="clocks"></div>
    </div>

  </div>
</div>

<!-- PR Widget -->
<div id="pr-section" class="widget">
  <div class="pr-header">
    <div class="widget-title" style="margin-bottom:0" id="pr-widget-title">Open PRs — ROCm/rocm-libraries</div>
    <button id="pr-refresh">↻ Refresh</button>
  </div>
  <div id="pr-list"><div class="pr-status-msg">Loading…</div></div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Add Link</h2>
    <div class="field">
      <label>Title</label>
      <input id="inp-title" type="text" placeholder="e.g. GitHub PRs">
    </div>
    <div class="field">
      <label>URL</label>
      <input id="inp-url" type="url" placeholder="https://...">
    </div>
    <div class="field">
      <label>Icon (emoji)</label>
      <input id="inp-icon" type="text" placeholder="e.g. 🔗" maxlength="4">
    </div>
    <div class="field">
      <label>Accent Color</label>
      <div class="color-row" id="color-row"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancel-btn">Cancel</button>
      <button class="btn-save"   id="save-btn">Save</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;">
  <div id="settings-modal" style="background:#1e2130;border:1px solid #2a2d3e;border-radius:14px;padding:28px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,0.6);">
    <h2 style="font-size:1rem;margin-bottom:6px;color:#f1f5f9;">Settings</h2>
    <p style="font-size:0.78rem;color:#4b5563;margin-bottom:20px;">Stored locally in your browser — each person sets their own.</p>
    <div class="field">
      <label>Your GitHub Username</label>
      <input id="inp-ghuser" type="text" placeholder="e.g. AviralGoelAMD">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="settings-cancel">Cancel</button>
      <button class="btn-save"   id="settings-save">Save</button>
    </div>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────
const COLORS = ['#8b5cf6','#4f46e5','#0ea5e9','#10b981','#f59e0b','#ef4444','#ec4899','#6b7280'];

const DEFAULT_LINKS = [
  {
    title: "CK Pull Requests",
    url:   "https://github.com/ROCm/rocm-libraries/pulls?q=is%3Aopen+is%3Apr+label%3A%22project%3A+composablekernel%22",
    icon:  "🔀",
    color: "#8b5cf6"
  },
  {
    title: "CK Internal Repo",
    url:   "https://github.com/AMD-ROCm-Internal/composable_kernel",
    icon:  "📦",
    color: "#4f46e5"
  },
  {
    title: "rocm-libraries",
    url:   "https://github.com/ROCm/rocm-libraries",
    icon:  "🗃️",
    color: "#0ea5e9"
  },
  {
    title: "CK Public Repo",
    url:   "https://github.com/ROCm/rocm-libraries/tree/develop/projects/composablekernel",
    icon:  "🌐",
    color: "#4f46e5"
  },
  {
    title: "Jenkins (Internal)",
    url:   "http://micimaster.amd.com/job/CK-Internal/",
    icon:  "⚙️",
    color: "#f59e0b"
  },
  {
    title: "Jenkins (Public)",
    url:   "http://micimaster.amd.com/job/rocm-libraries-folder/job/Composable%20Kernel/",
    icon:  "🔧",
    color: "#ea580c"
  },
  {
    title: "SuccessFactors",
    url:   "https://performancemanager4.successfactors.com/sf/home?bplte_company=AMD&_s.crb=UeyqsXtKzSJHFFNgy8vnJewegnxIWT59EbKwYVXzrV8%253d",
    icon:  "👤",
    color: "#10b981"
  },
  {
    title: "AMD Jobs",
    url:   "https://internal-amd.icims.com/jobs/dashboard",
    icon:  "💼",
    color: "#6b7280"
  },
  {
    title: "AMD Connect",
    url:   "https://amdcloud.sharepoint.com/sites/amd-connect",
    icon:  "🏢",
    color: "#0ea5e9"
  },
  {
    title: "WhatsApp",
    url:   "https://web.whatsapp.com/",
    icon:  "💬",
    color: "#25d366"
  },
  {
    title: "Jira",
    url:   "https://amd-hub.atlassian.net/jira/for-you",
    icon:  "🎯",
    color: "#0052cc"
  },
  {
    title: "Confluence",
    url:   "https://amd.atlassian.net/wiki/",
    icon:  "📝",
    color: "#0065ff"
  }
];

const TIMEZONES = [
  { label: "EST", tz: "America/New_York",    dot: "#4f46e5", flag: "🗽" },
  { label: "CST", tz: "America/Chicago",     dot: "#10b981", flag: "🌆" },
  { label: "MST", tz: "America/Denver",      dot: "#f59e0b", flag: "🏔️" },
  { label: "PST", tz: "America/Los_Angeles", dot: "#ef4444", flag: "🌉" },
];

// ── State ────────────────────────────────────────────────────
let links = JSON.parse(localStorage.getItem('dashboard-links-v7') || 'null');
if (!links) {
  links = DEFAULT_LINKS;
  localStorage.setItem('dashboard-links-v7', JSON.stringify(links));
}

let selectedColor = COLORS[0];
let githubUser    = localStorage.getItem('dashboard-gh-user') || '';

// ── Greeting ─────────────────────────────────────────────────
function updateGreeting() {
  const hour = new Date().getHours();
  const greet = hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
  const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('greeting').textContent = `${greet} — ${dateStr}`;
}
updateGreeting();

// ── World Clock ──────────────────────────────────────────────
function isWorkingHours(tz) {
  const now = new Date();
  const h = parseInt(new Intl.DateTimeFormat('en-US', { hour: 'numeric', hour12: false, timeZone: tz }).format(now));
  return h >= 9 && h < 18;
}

function renderClocks() {
  const container = document.getElementById('clocks');
  container.innerHTML = '';

  TIMEZONES.forEach((entry, i) => {
    const now = new Date();

    const timeStr = new Intl.DateTimeFormat('en-US', {
      hour: 'numeric', minute: '2-digit', second: '2-digit',
      hour12: true, timeZone: entry.tz
    }).format(now);

    const dateStr = new Intl.DateTimeFormat('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      timeZone: entry.tz
    }).format(now);

    const working = isWorkingHours(entry.tz);

    const row = document.createElement('div');
    row.className = 'clock-row';
    row.innerHTML = `
      <div class="clock-label">
        <span class="tz-dot" style="background:${entry.dot}"></span>
        ${entry.flag} ${entry.label}
        <span class="working-indicator ${working ? 'active' : 'outside'}">${working ? 'online' : 'off hrs'}</span>
      </div>
      <div class="clock-right">
        <div class="clock-time" id="time-${i}">${timeStr}</div>
        <div class="clock-date" id="date-${i}">${dateStr}</div>
      </div>
    `;
    container.appendChild(row);

    if (i < TIMEZONES.length - 1) {
      const hr = document.createElement('hr');
      hr.className = 'clock-divider';
      container.appendChild(hr);
    }
  });
}

function tickClocks() {
  const now = new Date();
  TIMEZONES.forEach((entry, i) => {
    const timeEl = document.getElementById(`time-${i}`);
    const dateEl = document.getElementById(`date-${i}`);
    if (!timeEl) return;

    timeEl.textContent = new Intl.DateTimeFormat('en-US', {
      hour: 'numeric', minute: '2-digit', second: '2-digit',
      hour12: true, timeZone: entry.tz
    }).format(now);

    dateEl.textContent = new Intl.DateTimeFormat('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      timeZone: entry.tz
    }).format(now);
  });
}

renderClocks();
setInterval(tickClocks, 1000);

// ── Link Tiles ───────────────────────────────────────────────
function saveLinks() {
  localStorage.setItem('dashboard-links-v7', JSON.stringify(links));
}

function render() {
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty-msg');
  grid.innerHTML = '';
  empty.style.display = links.length ? 'none' : 'block';

  links.forEach((link, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';

    const accent = document.createElement('div');
    accent.className = 'tile-accent';
    accent.style.background = link.color || COLORS[0];

    const a = document.createElement('a');
    a.href   = link.url;
    a.target = '_blank';
    a.rel    = 'noopener noreferrer';

    const icon  = document.createElement('div');
    icon.className   = 'tile-icon';
    icon.textContent = link.icon || '🔗';

    const title = document.createElement('div');
    title.className   = 'tile-title';
    title.textContent = link.title;

    const url = document.createElement('div');
    url.className   = 'tile-url';
    url.textContent = link.url.replace(/^https?:\/\//, '').replace(/\?.*$/, '');

    a.append(icon, title, url);

    const del = document.createElement('button');
    del.className   = 'delete-btn';
    del.textContent = '✕';
    del.title       = 'Remove';
    del.addEventListener('click', (e) => {
      e.preventDefault();
      links.splice(i, 1);
      saveLinks();
      render();
    });

    // Drag-and-drop
    tile.setAttribute('draggable', 'true');
    tile.dataset.index = i;

    tile.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', i);
      setTimeout(() => tile.classList.add('dragging'), 0);
    });
    tile.addEventListener('dragend', () => {
      tile.classList.remove('dragging');
      document.querySelectorAll('.tile').forEach(t => t.classList.remove('drag-over'));
    });
    tile.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.tile').forEach(t => t.classList.remove('drag-over'));
      tile.classList.add('drag-over');
    });
    tile.addEventListener('dragleave', () => tile.classList.remove('drag-over'));
    tile.addEventListener('drop', e => {
      e.preventDefault();
      tile.classList.remove('drag-over');
      const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
      const toIdx   = parseInt(tile.dataset.index);
      if (fromIdx === toIdx) return;
      const moved = links.splice(fromIdx, 1)[0];
      links.splice(toIdx, 0, moved);
      saveLinks();
      render();
    });

    tile.append(accent, a, del);
    grid.appendChild(tile);
  });
}

// ── PR Widget ────────────────────────────────────────────────
function relativeAge(dateStr) {
  const diff  = Date.now() - new Date(dateStr).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins  < 60)  return `${mins}m ago`;
  if (hours < 24)  return `${hours}h ago`;
  return `${days}d ago`;
}

async function fetchPRs() {
  if (!githubUser) throw new Error('NO_USER');
  const q = `is:open is:pr repo:ROCm/rocm-libraries label:"project: composablekernel" author:${githubUser}`;
  const url = `https://api.github.com/search/issues?q=${encodeURIComponent(q)}&per_page=30&sort=updated&order=desc`;
  const res = await fetch(url, { headers: { Accept: 'application/vnd.github+json' } });
  if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
  return res.json();
}

function renderPRs(items) {
  const list = document.getElementById('pr-list');
  if (!items.length) {
    list.innerHTML = '<div class="pr-status-msg">No open PRs found.</div>';
    return;
  }
  list.innerHTML = '';
  items.forEach(pr => {
    const isDraft     = pr.draft;
    const needsReview = pr.labels.some(l => l.name.toLowerCase().includes('review'));

    let badgeHtml = '';
    if (isDraft)           badgeHtml = '<span class="pr-badge badge-draft">Draft</span>';
    else if (needsReview)  badgeHtml = '<span class="pr-badge badge-review">Review</span>';
    else                   badgeHtml = '<span class="pr-badge badge-open">Open</span>';

    const checksUrl = pr.html_url;

    // Outer div is clickable (navigates to PR); CI badge is a separate link inside
    const row = document.createElement('div');
    row.className = 'pr-item';
    row.style.cursor = 'pointer';
    row.dataset.href = pr.html_url;
    row.addEventListener('click', () => window.open(pr.html_url, '_blank'));

    row.innerHTML = `
      <span class="pr-number">#${pr.number}</span>
      <span class="pr-title">${pr.title}</span>
      <span class="pr-meta">
        <span class="pr-age">updated ${relativeAge(pr.updated_at)}</span>
        ${badgeHtml}
        <a class="ci-badge ci-pending"
           id="ci-${pr.number}"
           href="${checksUrl}"
           target="_blank"
           rel="noopener noreferrer"
           title="View checks"
           onclick="event.stopPropagation()">CI ···</a>
      </span>
    `;
    list.appendChild(row);
  });
}

// Combine check-runs + commit statuses into one accurate summary,
// matching what GitHub shows on the PR checks page.
function computeCIStatus(checkRuns, commitStatuses) {
  // Deduplicate check-runs: keep only the latest attempt per name
  const latest = {};
  checkRuns.forEach(r => {
    if (!latest[r.name] || r.id > latest[r.name].id) latest[r.name] = r;
  });
  const runs = Object.values(latest);

  // Counts from check-runs
  const crPending = runs.filter(r => r.status !== 'completed').length;
  const crFailed  = runs.filter(r => ['failure','timed_out','action_required'].includes(r.conclusion)).length;
  const crSkipped = runs.filter(r => ['skipped','neutral'].includes(r.conclusion)).length;
  const crPassed  = runs.filter(r => r.conclusion === 'success').length;

  // Counts from legacy commit statuses (separate API, separate CI systems)
  const stPending = commitStatuses.filter(s => s.state === 'pending').length;
  const stFailed  = commitStatuses.filter(s => ['failure','error'].includes(s.state)).length;
  const stPassed  = commitStatuses.filter(s => s.state === 'success').length;

  const totalFailed  = crFailed  + stFailed;
  const totalPending = crPending + stPending;
  const totalSkipped = crSkipped;
  const totalPassed  = crPassed  + stPassed;
  const total        = runs.length + commitStatuses.length;

  if (!total) return { cls: 'ci-unknown', label: 'CI –' };

  // Build a summary label like GitHub: "1 failing, 2 pending, 28 passed"
  if (!total) return { cls: 'ci-unknown', label: 'CI –' };

  const parts = [];
  if (totalFailed)  parts.push(`✗ ${totalFailed} failing`);
  if (totalPending) parts.push(`⟳ ${totalPending} pending`);
  if (totalSkipped) parts.push(`${totalSkipped} skipped`);
  if (totalPassed)  parts.push(`✓ ${totalPassed} passed`);

  const label = parts.join(' · ');
  if (totalFailed)  return { cls: 'ci-failure', label };
  if (totalPending) return { cls: 'ci-running',  label };
  return { cls: 'ci-success', label };
}

async function loadCIForPR(prNumber) {
  // 1. Get head SHA
  const prRes = await fetch(
    `https://api.github.com/repos/ROCm/rocm-libraries/pulls/${prNumber}`,
    { headers: { Accept: 'application/vnd.github+json' } }
  );
  if (!prRes.ok) throw new Error(`PR fetch ${prRes.status}`);
  const sha = (await prRes.json()).head.sha;

  // 2. Fetch ALL check-runs across pages (filter=all so we get every suite)
  let checkRuns = [], page = 1;
  while (true) {
    const res  = await fetch(
      `https://api.github.com/repos/ROCm/rocm-libraries/commits/${sha}/check-runs?per_page=100&filter=all&page=${page}`,
      { headers: { Accept: 'application/vnd.github+json' } }
    );
    const data = await res.json();
    const batch = data.check_runs || [];
    checkRuns = checkRuns.concat(batch);
    if (batch.length < 100) break;
    page++;
  }

  // 3. Fetch legacy commit statuses (different CI systems use this older API)
  const stRes  = await fetch(
    `https://api.github.com/repos/ROCm/rocm-libraries/commits/${sha}/status`,
    { headers: { Accept: 'application/vnd.github+json' } }
  );
  const stData = await stRes.json();
  const commitStatuses = stData.statuses || [];

  return { checkRuns, commitStatuses };
}

async function loadAllCI(prNumbers) {
  await Promise.allSettled(prNumbers.map(async (num) => {
    const el = document.getElementById(`ci-${num}`);
    if (!el) return;
    try {
      const { checkRuns, commitStatuses } = await loadCIForPR(num);
      const { cls, label } = computeCIStatus(checkRuns, commitStatuses);
      el.className = `ci-badge ${cls}`;
      el.textContent = label;
    } catch {
      el.className = 'ci-badge ci-unknown';
      el.textContent = 'CI ?';
    }
  }));
}

function updatePRTitle() {
  const el = document.getElementById('pr-widget-title');
  if (el) el.textContent = githubUser ? `${githubUser}'s Open PRs — ROCm/rocm-libraries` : 'Open PRs — ROCm/rocm-libraries';
}

async function loadPRs() {
  const btn  = document.getElementById('pr-refresh');
  const list = document.getElementById('pr-list');
  updatePRTitle();

  if (!githubUser) {
    list.innerHTML = `
      <div id="setup-banner">
        <p>Set your GitHub username to see your open PRs.</p>
        <button onclick="openSettings()">Set username →</button>
      </div>`;
    return;
  }

  btn.disabled = true;
  btn.textContent = '…';
  list.innerHTML = '<div class="pr-status-msg">Loading…</div>';
  try {
    const data = await fetchPRs();
    renderPRs(data.items);
    loadAllCI(data.items.map(pr => pr.number));
  } catch (e) {
    list.innerHTML = `<div class="pr-status-msg">Failed to load PRs: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Refresh';
  }
}

});

});

loadPRs();

// ── Stock Ticker ─────────────────────────────────────────────
async function fetchAMDStock() {
  const apiUrl = 'https://query2.finance.yahoo.com/v8/finance/chart/AMD?interval=1d&range=2d';
  const res     = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(apiUrl));
  const wrapper = await res.json();
  const data    = JSON.parse(wrapper.contents);
  const meta = data.chart.result[0].meta;
  const price     = meta.regularMarketPrice;
  const prevClose = meta.previousClose ?? meta.chartPreviousClose;
  const change    = price - prevClose;
  const changePct = (change / prevClose) * 100;
  const low52     = meta.fiftyTwoWeekLow  ?? meta.regularMarketDayLow;
  const high52    = meta.fiftyTwoWeekHigh ?? meta.regularMarketDayHigh;
  const state     = meta.marketState; // REGULAR, PRE, POST, CLOSED
  return { price, change, changePct, low52, high52, state };
}

function renderStock({ price, change, changePct, low52, high52, state }) {
  const up        = change >= 0;
  const sign      = up ? '+' : '';
  const barPct    = Math.min(100, Math.max(0, ((price - low52) / (high52 - low52)) * 100));
  const barColor  = up ? '#10b981' : '#f87171';
  const stateLabel = state === 'REGULAR' ? 'Market open' : state === 'PRE' ? 'Pre-market' : state === 'POST' ? 'After-hours' : 'Market closed';

  document.getElementById('stock-body').innerHTML = `
    <div class="stock-price">$${price.toFixed(2)}</div>
    <div class="stock-change ${up ? 'up' : 'down'}">
      ${sign}$${Math.abs(change).toFixed(2)} (${sign}${changePct.toFixed(2)}%) today
    </div>
    <div class="stock-meta">52w $${low52.toFixed(0)} – $${high52.toFixed(0)} · ${stateLabel}</div>
    <div class="stock-bar-wrap">
      <div class="stock-bar" style="width:${barPct}%;background:${barColor}"></div>
    </div>
  `;
}

async function loadStock() {
  try {
    const data = await fetchAMDStock();
    renderStock(data);
  } catch {
    document.getElementById('stock-body').innerHTML =
      '<div style="color:#4b5563;font-size:0.78rem">Unable to load — market data unavailable</div>';
  }
}

loadStock();
setInterval(loadStock, 5 * 60 * 1000); // refresh every 5 min

// ── Init ─────────────────────────────────────────────────────
render();
